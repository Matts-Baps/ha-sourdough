record_feeding:
  name: Record Feeding
  description: >
    Record that you have fed your sourdough starter. If amounts are omitted,
    the configured defaults are used. Amounts should be in the unit system
    configured for that entry (grams for metric, ounces for imperial).
  fields:
    entry_id:
      name: Entry ID
      description: >
        The config entry ID of the sourdough tracker to update. Omit if you
        only have one sourdough tracker configured.
      required: false
      example: "abc123def456"
      selector:
        text:
    flour:
      name: Flour Added
      description: Amount of flour added (g or oz depending on your unit setting).
      required: false
      example: 60
      selector:
        number:
          min: 0
          max: 1000
          step: 0.1
          unit_of_measurement: "g / oz"
    water:
      name: Water Added
      description: Amount of water added (g or oz depending on your unit setting).
      required: false
      example: 60
      selector:
        number:
          min: 0
          max: 1000
          step: 0.1
          unit_of_measurement: "g / oz"
    discarded:
      name: Discarded Amount
      description: >
        Amount of starter discarded before feeding (g or oz). Omit or set to 0
        for Days 1 and 2 when no discard is needed.
      required: false
      example: 60
      selector:
        number:
          min: 0
          max: 10000
          step: 0.1
          unit_of_measurement: "g / oz"

reset_process:
  name: Reset Process
  description: >
    Reset the sourdough process to Day 1. This clears all feeding history and
    resets the start time to now. Use this if you are starting fresh.
  fields:
    entry_id:
      name: Entry ID
      description: >
        The config entry ID of the sourdough tracker to reset. Omit if you
        only have one sourdough tracker configured.
      required: false
      example: "abc123def456"
      selector:
        text:
